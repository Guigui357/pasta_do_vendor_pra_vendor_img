name: Build Vendor IMG + Flashable ZIP

on:
  workflow_dispatch:
    inputs:
      vendor_zip_url:
        description: "Link direto do vendor.zip"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            unzip \
            rsync \
            e2fsprogs \
            img2simg \
            wget \
            zip


      - name: Download vendor.zip
        run: |
          mkdir work
          cd work
          wget "${{ github.event.inputs.vendor_zip_url }}" -O vendor.zip


      - name: Extract vendor
        run: |
          cd work
          unzip -q vendor.zip

          if [ -d vendor/vendor ]; then
            mv vendor/vendor vendor_root
          elif [ -d vendor ]; then
            mv vendor vendor_root
          else
            mkdir vendor_root
            shopt -s dotglob
            mv * vendor_root/ 2>/dev/null || true
          fi

          echo "Vendor content:"
          ls vendor_root | head


      - name: Calculate image size
        run: |
          cd work
          SIZE=$(du -sm vendor_root | cut -f1)
          SIZE=$((SIZE + 300))
          echo "SIZE=$SIZE" >> $GITHUB_ENV


      - name: Create vendor.img
        run: |
          cd work

          dd if=/dev/zero of=vendor.img bs=1M count=${SIZE}
          mkfs.ext4 -F -L vendor vendor.img

          mkdir mnt
          sudo mount -o loop vendor.img mnt

          sudo rsync -aHAX vendor_root/ mnt/

          sudo umount mnt


      - name: Create sparse image
        run: |
          cd work
          img2simg vendor.img vendor_sparse.img


      - name: Prepare flashable structure
        run: |
          cd work

          mkdir -p flash/META-INF/com/google/android

          cat > flash/META-INF/com/google/android/updater-script <<EOF
          ui_print("Flashing vendor image...");
          package_extract_file("vendor.img", "/dev/block/by-name/vendor");
          ui_print("Vendor flash complete!");
          EOF

          printf '#!/sbin/sh\nexit 0\n' > flash/META-INF/com/google/android/update-binary
          chmod +x flash/META-INF/com/google/android/update-binary

          cp vendor.img flash/


      - name: Create flashable zip
        run: |
          cd work/flash
          zip -r ../vendor_flashable.zip *


      - name: Upload vendor.img
        uses: actions/upload-artifact@v4
        with:
          name: vendor-img
          path: work/vendor.img


      - name: Upload vendor_sparse.img
        uses: actions/upload-artifact@v4
        with:
          name: vendor-sparse
          path: work/vendor_sparse.img


      - name: Upload vendor_flashable.zip
        uses: actions/upload-artifact@v4
        with:
          name: vendor-flashable
          path: work/vendor_flashable.zip
